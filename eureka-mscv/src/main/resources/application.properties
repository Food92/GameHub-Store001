spring.application.name=eureka-mscv

# Puerto estandar del servidor Eureka. El panel queda en http://localhost:8761
server.port=8761

# El propio servidor NO se registra ni descarga el registro: el es el registro.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 🛠️ SOLUCIÓN AL CARTEL DE EMERGENCIA (Para tu entorno de desarrollo)
# Desactiva la autoprotección para que no entre en pánico si apagas un microservicio
eureka.server.enable-self-preservation=false

# Limpia los servicios caídos cada 2 segundos de forma inmediata
eureka.server.eviction-interval-timer-in-ms=2000